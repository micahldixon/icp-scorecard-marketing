<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — ICP Scorecard</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1D1D1D;
      --charcoal: #2A2A2A;
      --card: #242424;
      --card-border: rgba(254,248,227,0.06);
      --accent: #FFC005;
      --cream: #FEF8E3;
      --cream-50: rgba(254,248,227,0.5);
      --cream-30: rgba(254,248,227,0.3);
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,192,5,0.06), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(217,210,233,0.04), transparent);
    }
    .wrap {
      width: 100%;
      max-width: 400px;
      animation: enter 0.5s ease both;
    }
    @keyframes enter {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo { margin-bottom: 24px; }
    .logo svg { height: 36px; width: auto; display: block; }
    h1 {
      font-family: 'Anton', sans-serif;
      font-size: 24px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--cream);
      margin-bottom: 6px;
    }
    .sub {
      font-size: 14px;
      color: var(--cream-50);
      margin-bottom: 28px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 28px;
    }
    .card:hover { border-color: rgba(254,248,227,0.1); }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--cream-50);
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      background: var(--charcoal);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--cream);
      font-size: 16px;
      font-family: inherit;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(255,192,5,0.15);
    }
    input[type="password"]::placeholder { color: var(--cream-30); }
    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: #1D1D1D;
      border: none;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: filter 0.2s, transform 0.1s;
    }
    button[type="submit"]:hover { filter: brightness(1.08); }
    button[type="submit"]:active { transform: scale(0.99); }
    .err {
      font-size: 13px;
      color: #f87171;
      margin-bottom: 16px;
      min-height: 20px;
    }
    .footer {
      margin-top: 24px;
      text-align: center;
    }
    .footer a {
      font-size: 12px;
      color: var(--cream-30);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: var(--cream-50); }
  </style>
</head>

      </svg>
    </div>
    <h1>ICP Scorecard</h1>
    <p class="sub">Enter the password to continue.</p>
    <div class="card">
      <form method="post" action="/api/login" id="form">
        <div class="err" id="err" role="alert" aria-live="polite"></div>
        <label for="password">Password</label>
        <input type="password" name="password" id="password" autocomplete="current-password" required autofocus placeholder=" ">
        <button type="submit">Sign in</button>
      </form>
    </div>
    <p class="footer"><a href="/api/logout">Clear session</a></p>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var errEl = document.getElementById('err');
      if (params.get('error') === '1') {
        errEl.textContent = 'Invalid password. Try again.';
      }
    })();
  </script>
</body>
</html>
